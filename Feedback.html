<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Luxury Stay | All-in-One Booking</title>
    <style>
        /* CSS STYLES */
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Arial', sans-serif; }
        body { line-height: 1.6; color: #333; scroll-behavior: smooth; background: #f9f9f9; }

        /* Navigation */
        nav {
            display: flex; justify-content: space-between; align-items: center;
            padding: 15px 5%; background: #2c3e50; color: white; position: sticky; top: 0; z-index: 1000;
        }
        .nav-links { display: flex; list-style: none; }
        .nav-links li { margin-left: 20px; }
        .nav-links a { color: white; text-decoration: none; font-weight: bold; }

        /* Sections */
        section { padding: 80px 10%; text-align: center; min-height: 50vh; }
        .hero { 
            background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), 
            url('https://images.unsplash.com');
            background-size: cover; background-position: center;
            height: 80vh; display: flex; flex-direction: column; justify-content: center; color: white; 
        }
        .hero h1 { font-size: 3.5rem; margin-bottom: 10px; }

        .about { background: white; }
        .booking { background: #ecf0f1; }
        .feedback { background: white; }

        /* Forms */
        .card { 
            max-width: 500px; margin: 20px auto; background: white; 
            padding: 30px; border-radius: 10px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); text-align: left;
        }
        label { display: block; margin: 10px 0 5px; font-weight: bold; }
        input, select, textarea { width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 5px; margin-bottom: 15px; }

        /* Buttons */
        .btn { 
            display: block; width: 100%; padding: 15px; background: #e67e22; 
            color: white; text-align: center; text-decoration: none; 
            font-weight: bold; border-radius: 5px; border: none; cursor: pointer;
        }
        .btn:hover { background: #d35400; }

        /* Thank You Page Simulation */
        #thank-you { 
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: white; z-index: 2000; flex-direction: column; justify-content: center; align-items: center; 
        }
        #thank-you:target { display: flex; } /* Shows the page when the URL ends in #thank-you */

        footer { background: #2c3e50; color: white; padding: 20px; text-align: center; }
    </style>
</head>
<body>
<!-- NAVBAR -->
<nav>
    <div class="logo"> stay easy <span>Realty</span> HOTEL</div>
    <div>
        <a href="Home.html">Home</a>
        <a href="file:///C:/Users/rajde/Desktop/final%20project/about.html">About Us</a>
        <a href="file:///C:/Users/rajde/Desktop/final%20project/booking.html">Booking</a>
        <a href="file:///C:/Users/rajde/Desktop/final%20project/Feedback.html">Feedback</a>
        <a href="file:///C:/Users/rajde/Desktop/final%20project/help.html">Help</a>
    </div>
</nav>
<!-- Feedback Section -->
    <section id="feedback" class="feedback">
        <h2>Give Us Feedback</h2>
        <div class="card">
            <label>Your Message</label>
            <textarea rows="4" placeholder="How was your stay?"></textarea>
            <button class="btn" onclick="alert('Feedback Received!')">Send Feedback</button>
        </div>
    </section>
</body>
</html>
